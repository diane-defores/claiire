name: Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/android-debug.yml'
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK (release)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Generate native project (prebuild)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_URL }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_URL }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: claiire-${{ github.sha }}
          path: app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
          if-no-files-found: error

      - name: Build summary
        run: |
          APK_SIZE=$(du -sh android/app/build/outputs/apk/release/app-release.apk | cut -f1)
          echo "### Android APK (release)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** ${APK_SIZE}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Download:** Artifacts section below" >> $GITHUB_STEP_SUMMARY
